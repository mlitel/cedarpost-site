<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CedarPost — Church communication and directory software</title>
<meta name="description" content="CedarPost is church communication and directory software. A Stetline LLC product.">
<style>
  :root {
    --forest-950: #0C201A;
    --forest-900: #14332A;
    --forest-700: #1E4D3B;
    --bark-600: #6B5642;
    --cream-100: #F6F1E7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--forest-950);
    color: var(--cream-100);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    flex: 1;
    justify-content: center;
  }
  .mark { width: 96px; height: auto; }
  h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    margin-left: 0.35em; /* optically recenters letter-spaced caps */
    text-transform: uppercase;
  }
  .tagline {
    font-size: 1.0625rem;
    font-weight: 400;
    color: rgba(246, 241, 231, 0.75);
    line-height: 1.6;
    max-width: 28rem;
  }
  .rule {
    width: 48px;
    height: 2px;
    background: var(--bark-600);
    border: 0;
  }
  footer {
    font-size: 0.8125rem;
    color: rgba(246, 241, 231, 0.5);
    line-height: 1.7;
    padding-top: 2rem;
  }
  footer a {
    color: rgba(246, 241, 231, 0.7);
    text-decoration: none;
    border-bottom: 1px solid rgba(107, 86, 66, 0.8);
  }
  footer a:hover { color: var(--cream-100); }
</style>
</head>
